apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <html>
    <head><title>K3S Cluster</title></head>
    <body style="font-family: monospace; background: #1a1a2e; color: #00ff88; text-align: center; padding-top: 100px;">
      <h1>Cluster K3S - La Plateforme</h1>
      <p>Page servie depuis un ConfigMap</p>
      <p>Job 06 - Gestion de la configuration</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - name: nginx-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: nginx-html
        configMap:
          name: nginx-html
